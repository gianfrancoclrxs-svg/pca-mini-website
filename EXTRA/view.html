<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>View Appointment</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  .section {
    margin: 15px;
  }

  .section input {
    width: 100%;
    margin: 6px 0;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid rgba(0,0,0,0.25);
    background: rgba(0,0,0,0.25);
    color: white;
    font-family: inherit;
    font-size: 13px;
  }

  .section input::placeholder { color: rgba(255,255,255,0.7); }

  .section input:focus {
    outline: none;
    border-color: rgba(255,255,255,0.7);
    background: rgba(0,0,0,0.35);
  }

  .btn-primary {
    width: 100%;
    margin: 6px 0;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #0d6d05;
    color: white;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    font-weight: 600;
    transition: background 0.2s, transform 0.15s;
  }

  .btn-primary:hover  { background: #155c0c; transform: translateY(-1px); }
  .btn-primary:active { transform: scale(0.98); }

  .btn-secondary {
    width: 100%;
    margin: 6px 0;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.12);
    color: white;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    font-weight: 600;
    transition: background 0.2s;
  }

  .btn-secondary:hover { background: rgba(255,255,255,0.22); }

  /* Appointment card */
  .appt-card {
    margin: 12px 0;
    padding: 15px;
    border-radius: 15px;
    background: rgba(255,255,255,0.13);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.25);
    color: white;
  }

  .appt-card .appt-name {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 10px;
    letter-spacing: 0.2px;
  }

  .appt-row {
    display: flex;
    gap: 8px;
    margin: 4px 0;
    font-size: 13px;
  }

  .appt-label {
    opacity: 0.7;
    min-width: 80px;
    flex-shrink: 0;
  }

  .appt-val { font-weight: 600; }

  .divider {
    height: 1px;
    background: rgba(255,255,255,0.2);
    margin: 10px 0;
  }

  /* STATUS BADGES */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .status-badge::before {
    content: '';
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .status-active {
    background: #1b5e20;
    border: 1.5px solid #4caf50;
    color: #a5d6a7;
    box-shadow: 0 0 10px rgba(76,175,80,0.5);
  }
  .status-active::before { background: #69f0ae; box-shadow: 0 0 5px #69f0ae; }

  .status-cancelled {
    background: #7f0000;
    border: 1.5px solid #f44336;
    color: #ffcdd2;
    box-shadow: 0 0 10px rgba(244,67,54,0.5);
  }
  .status-cancelled::before { background: #ff5252; box-shadow: 0 0 5px #ff5252; }

  .status-done {
    background: #0d47a1;
    border: 1.5px solid #2196f3;
    color: #bbdefb;
    box-shadow: 0 0 10px rgba(33,150,243,0.5);
  }
  .status-done::before { background: #40c4ff; box-shadow: 0 0 5px #40c4ff; }

  .status-pending {
    background: #e65100;
    border: 1.5px solid #ffa726;
    color: #ffe0b2;
    box-shadow: 0 0 10px rgba(255,152,0,0.5);
  }
  .status-pending::before { background: #ffd740; box-shadow: 0 0 5px #ffd740; }

  /* ACTION BUTTONS */
  .actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .actions button {
    flex: 1;
    padding: 9px 6px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    font-family: inherit;
    transition: filter 0.2s, transform 0.15s;
  }

  .actions button:hover  { filter: brightness(1.15); }
  .actions button:active { transform: scale(0.96); }

  .view-btn {
    background: linear-gradient(135deg, #1565c0, #1e88e5);
    color: white;
    box-shadow: 0 3px 8px rgba(21,101,192,0.5);
  }

  .pdf-btn {
    background: linear-gradient(135deg, #2e7d32, #43a047);
    color: white;
    box-shadow: 0 3px 8px rgba(46,125,50,0.5);
  }

  .cancel-btn {
    background: linear-gradient(135deg, #b71c1c, #e53935);
    color: white;
    box-shadow: 0 3px 8px rgba(183,28,28,0.5);
  }

  .state-msg {
    text-align: center;
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    margin-top: 20px;
  }


  .home-btn {
    display: block;
    width: calc(100% - 30px);
    margin: 0 15px 20px;
    padding: 11px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.12);
    color: white;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: background 0.2s;
    box-sizing: border-box;
  }
  .home-btn:hover { background: rgba(255,255,255,0.22); }
</style>
</head>

<body>

<div class="mobile-frame">
  <header class="header">
    <h2>View Appointment</h2>
  </header>

  <div class="section">
    <input type="tel" id="phoneInput" placeholder="Enter Phone Number *">
    <button class="btn-primary" onclick="searchAppointments()">Search</button>
    <div id="results"></div>
  </div>

  <button class="home-btn" onclick="window.location.href='index.html'">
    <i class="fa fa-house" style="margin-right:6px;"></i> Home
  </button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="view-script.js"></script>
<script defer src="/_vercel/analytics/script.js"></script>

</body>
</html>
