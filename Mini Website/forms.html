<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PCA Forms</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .section {
      margin: 15px;
    }

    /* Search bar */
    .search-wrap {
      position: relative;
      margin-bottom: 14px;
    }

    .search-wrap i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      pointer-events: none;
    }

    .search-wrap input {
      width: 100%;
      padding: 10px 12px 10px 34px;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.25);
      background: rgba(0,0,0,0.25);
      color: white;
      font-family: inherit;
      font-size: 13px;
      box-sizing: border-box;
    }

    .search-wrap input::placeholder { color: rgba(255,255,255,0.7); }
    .search-wrap input:focus { outline: none; border-color: rgba(255,255,255,0.7); background: rgba(0,0,0,0.35); }

    /* Category filter pills */
    .filter-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .filter-pill {
      padding: 5px 13px;
      border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.85);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.3px;
      transition: background 0.2s, border-color 0.2s;
    }

    .filter-pill.active,
    .filter-pill:hover {
      background: rgba(255,255,255,0.28);
      border-color: white;
      color: white;
    }

    /* Form card */
    .form-card {
      margin-bottom: 12px;
      padding: 15px;
      border-radius: 15px;
      background: rgba(0,0,0,0.22);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(0,0,0,0.15);
      color: white;
      transition: background 0.2s;
    }

    .form-card:hover { background: rgba(0,0,0,0.30); }

    .form-card-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 8px;
    }

    .form-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(0,0,0,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .form-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 3px;
    }

    .form-category {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      background: rgba(109,224,74,0.25);
      border: 1px solid rgba(109,224,74,0.5);
      color: #a5d6a7;
    }

    .form-desc {
      font-size: 12px;
      opacity: 0.7;
      line-height: 1.5;
      margin: 8px 0 10px;
    }

    /* Button row */
    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .view-btn, .dl-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex: 1;
      padding: 9px;
      border-radius: 10px;
      border: none;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: filter 0.2s, transform 0.15s;
    }

    .view-btn {
      background: rgba(255,255,255,0.18);
      color: white;
      border: 1.5px solid rgba(255,255,255,0.35);
    }

    .view-btn:hover  { background: rgba(255,255,255,0.28); }
    .view-btn:active { transform: scale(0.97); }

    .dl-btn {
      background: linear-gradient(135deg, #4caf50, #66bb6a);
      color: white;
      box-shadow: 0 3px 10px rgba(76,175,80,0.35);
    }

    .dl-btn:hover  { filter: brightness(1.1); }
    .dl-btn:active { transform: scale(0.97); }

    /* No download available */
    .no-file {
      font-size: 11px;
      opacity: 0.5;
      text-align: center;
      padding: 6px 0;
    }

    /* State messages */
    .state-msg {
      text-align: center;
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      padding: 30px 0;
    }

    .state-msg i {
      font-size: 32px;
      display: block;
      margin-bottom: 10px;
      opacity: 0.5;
    }

    /* Home button */
    .home-btn {
      display: block;
      width: calc(100% - 30px);
      margin: 0 15px 20px;
      padding: 11px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.12);
      color: white;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: background 0.2s;
    }

    .home-btn:hover { background: rgba(255,255,255,0.22); }
  </style>
</head>
<body>
<div class="mobile-frame">

  <header class="header">
    <h2>Forms &amp; Letters</h2>
  </header>

  <div class="section">
    <!-- Search -->
    <div class="search-wrap">
      <i class="fa fa-search"></i>
      <input type="text" id="searchInput" placeholder="Search forms..." oninput="filterForms()">
    </div>

    <!-- Category pills -->
    <div class="filter-row" id="filterRow">
      <button class="filter-pill active" data-cat="all" onclick="setFilter(this)">All</button>
    </div>

    <!-- Cards -->
    <div id="formsContainer">
      <div class="state-msg">
        <i class="fa fa-spinner fa-spin"></i>
        Loading forms...
      </div>
    </div>
  </div>

  <button class="home-btn" onclick="window.location.href='index.html'">
    <i class="fa fa-house" style="margin-right:6px;"></i> Home
  </button>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script defer src="/_vercel/analytics/script.js"></script>
<script src="forms-script.js"></script>
</body>
</html>
