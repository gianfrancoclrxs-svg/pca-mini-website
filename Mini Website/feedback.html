<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PCA Satisfaction</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .stars {
      display: flex;
      gap: 8px;
      font-size: 30px;
      cursor: pointer;
      margin: 10px 0;
    }

    .stars i {
      color: #ccc; 
      transition: color 0.2s;
    }

    .stars i.hover,
    .stars i.selected {
      color: gold;
    }

    textarea {
      min-height: 80px;
    }

    button.back-btn {
      margin-top: 10px;
      padding: 8px 12px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div class="mobile-frame">

  <header class="header">
    <h2>Satisfaction</h2>
  </header>

  <div class="section post-card">
    <p><strong>Rate PCA Services</strong></p>
    <select id="officeSelect">
      <option>Office of the Administration</option>
      <option>Human Resource Division</option>
      <option>Legal Affairs Service</option>
    </select>

    <div class="stars" id="starRating">
      <i class="fa-regular fa-star" data-value="1"></i>
      <i class="fa-regular fa-star" data-value="2"></i>
      <i class="fa-regular fa-star" data-value="3"></i>
      <i class="fa-regular fa-star" data-value="4"></i>
      <i class="fa-regular fa-star" data-value="5"></i>
    </div>

    <textarea id="comment" placeholder="Your feedback..."></textarea>
    <button id="submitFeedback">Submit</button>
    <button class="back-btn" onclick="location.href='index.html'">
      <i class="fa-solid fa-arrow-left"></i> Back
    </button>
  </div>

</div>

<script>
const stars = document.querySelectorAll("#starRating i");

stars.forEach((star, idx) => {
  star.addEventListener('mouseover', () => {
    stars.forEach((s, i) => {
      s.classList.toggle('hover', i <= idx);
    });
  });

  star.addEventListener('mouseout', () => {
    stars.forEach(s => s.classList.remove('hover'));
  });

  star.addEventListener('click', () => {
    stars.forEach((s, i) => {
      s.classList.toggle('selected', i <= idx);
    });
  });
});
</script>

<script type="module" src="feedback-db.js"></script>

</body>
</html>
